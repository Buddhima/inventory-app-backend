name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  deploy-dev:
    name: Deploy dev
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    env:
      DEPLOY_ENV: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write WorkflowMax config
        env:
          WFM_CONFIG_JSON: ${{ secrets.WFM_CONFIG_JSON }}
        run: |
          mkdir -p configs
          printf '%s' "$WFM_CONFIG_JSON" > configs/workflowmax-config.json

      - name: Deploy CDK stack
        run: npx cdk deploy InventoryApp-dev --require-approval never

  deploy-prod:
    name: Deploy prod
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: prod
    env:
      DEPLOY_ENV: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write WorkflowMax config
        env:
          WFM_CONFIG_JSON: ${{ secrets.WFM_CONFIG_JSON }}
        run: |
          mkdir -p configs
          printf '%s' "$WFM_CONFIG_JSON" > configs/workflowmax-config.json

      - name: Deploy CDK stack
        run: npx cdk deploy InventoryApp-prod --require-approval never
